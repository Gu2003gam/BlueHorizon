<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueHorizon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1 class="logo">BlueHorizon</h1>
            <h2>Login</h2>
            <span id='painel'></span>
            <form action="" id="form">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Insira o seu email">
                </div>
                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Insira a sua senha">
                </div>
                <button id="submit" class="sign-in-btn">Acessar</button>
            </form>
            <div class="social-login">
                <p>Ou entre com</p>
                <div class="social-icons">
                    <button class="social-btn google" style="border: 0px; background: rgba(255, 255, 255, 0.0);"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Google_Favicon_2025.svg/960px-Google_Favicon_2025.svg.png?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=thumbnail&_=20251015042304" alt="google" style="width: 20px;"></button>
                    <button class="social-btn github" style="border: 0px; background: rgba(255, 255, 255, 0.0);"><img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="github" style="width: 20px;"></button>
                    <button class="social-btn facebook" style="border: 0px; background: rgba(255, 255, 255, 0.0);"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/2023_Facebook_icon.svg/960px-2023_Facebook_icon.svg.png?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=thumbnail" alt="facebook" style="width: 20px;"></button>
                </div>
            </div>
            <p class="register-link">Não tem uma conta? Cadastre-se de graça.</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
